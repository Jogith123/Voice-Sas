steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/voice-ai-orchestrator:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/voice-ai-orchestrator:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/voice-ai-orchestrator'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'voice-ai-orchestrator'
      - '--image=gcr.io/$PROJECT_ID/voice-ai-orchestrator:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--port=8000'
      - '--set-secrets=MONGODB_URI=MONGODB_URI:latest,VAPI_API_KEY=VAPI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,VAPI_PHONE_NUMBER_ID=VAPI_PHONE_NUMBER_ID:latest'
      - '--set-env-vars=MONGODB_DB_NAME=voice_saas,OPENAI_MODEL=gpt-4o,GEMINI_MODEL=gemini-1.5-flash,APP_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/voice-ai-orchestrator:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/voice-ai-orchestrator:latest'

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
